let mode='map',current=0,flashIndex=0,flashFront=true,quiz=null,quizType='rootMeaning';
let state=JSON.parse(localStorage.getItem('sharkEtymologyState90')||'{"points":0,"correct":0,"total":0,"review":{},"learnedRoots":[],"learnedWords":[],"lastDate":"","streak":0,"today":0}');
function save(){localStorage.setItem('sharkEtymologyState90',JSON.stringify(state))}
function allWords(){return roots.flatMap(r=>r.words.map(w=>({...w,root:r.root,no:r.no,core:r.core,icon:r.icon})))}
function coach(msg){document.getElementById('coachMsg').textContent=msg}
function markToday(){const today=new Date().toDateString();if(state.lastDate!==today){const y=new Date(Date.now()-86400000).toDateString();state.streak=state.lastDate===y?state.streak+1:1;state.today=0;state.lastDate=today;save();}} markToday();
function esc(s){return String(s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function rootFilter(){const q=(document.getElementById('rootSearch')?.value||'').trim().toLowerCase();if(!q)return roots;return roots.filter(r=>r.root.toLowerCase().includes(q)||r.core.toLowerCase().includes(q)||r.words.some(w=>w.word.toLowerCase().includes(q)||w.meaning.includes(q)))}
function renderRootButtons(){const filtered=rootFilter();document.getElementById('rootButtons').innerHTML=filtered.map(r=>{const i=roots.findIndex(x=>x.no===r.no);return `<button onclick="current=${i};render()" class="${i===current?'active':''}">No.${r.no} ${r.root}<br><span class="small">${r.core}</span></button>`}).join('')+`<div class="note" style="margin-top:12px"><b>収録範囲</b><br>No.71〜90 を実装済み。検索にも対応しています。</div>`}
function setMode(m,el){mode=m;document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active');render()}

function renderMap(){const r=roots[current];state.learnedRoots=[...new Set([...state.learnedRoots,r.no])];save();const reps=r.words.slice(0,8).map(w=>`<span class="badge">${esc(w.word)}</span>`).join(' ');const cards=r.words.map(w=>`<div class="word"><b>${esc(w.word)}</b> <span class="badge">${esc(w.level)}</span><div style="margin-top:6px">意味：${esc(w.meaning)}</div><div class="small" style="margin-top:6px">語源で理解：${esc(w.memo)}</div></div>`).join('');document.getElementById('app').innerHTML=`<h2>No.${r.no} ${esc(r.root)}</h2><p><span class="badge">Core Image</span> ${esc(r.core)}</p><div class="illus-wrap"><div class="illus"><div class="big">${r.icon}</div><div class="label">${esc(r.core)}</div><div class="small">対比で覚えると強い語根です。</div></div><div class="coremap"><div class="center">${esc(r.root)}</div><div>🧠 ${esc(r.core)}</div><div class="flow">代表語：${reps}<br><br>「語根 → コアイメージ → 派生語」の順で見ると、抽象接頭辞の働きが見えやすくなります。</div></div></div><h3>この語源のつかみ方</h3><p>${esc(r.grasp)}</p><h3>収録語</h3><div class="word-list">${cards}</div>`;coach(`No.${r.no} は「${r.core}」が核。反意・対比の接頭辞と並べて覚えよう！`)}
function renderFlash(){const words=allWords();const w=words[flashIndex%words.length];const inner=flashFront?`<div><div class="front">${esc(w.word)}</div><p>${esc(w.root)} / ${esc(w.level)}</p><p class="small">クリックで裏面へ</p></div>`:`<div class="back"><b>${esc(w.word)}</b> <span class="badge">${esc(w.level)}</span><br>意味：${esc(w.meaning)}<br>例文：${esc(w.example)}<br>和訳：${esc(w.ja)}<br>語源で理解：${esc(w.memo)}<br><span class="small">もう一度クリックで表面へ</span></div>`;document.getElementById('app').innerHTML=`<h2>フラッシュカード</h2><div class="flash card" onclick="flipFlash()">${inner}</div><div class="subnav"><button onclick="speakWord()">🔊 単語</button><button onclick="speakExample()">🔊 例文</button><button onclick="prevFlash()">前へ</button><button onclick="nextFlash()">次へ</button></div><div class="note">クリックするたびに表裏が切り替わります。第4分冊は対比語根が多いので、反対語根も一緒に思い出すと効果的です。</div>`;state.learnedWords=[...new Set([...state.learnedWords,w.word])];save();coach('pan / poly / mono / hetero など、セットで思い出せると推測力が一気に上がるよ。')}
function flipFlash(){flashFront=!flashFront;renderFlash()} function nextFlash(){flashIndex=(flashIndex+1)%allWords().length;flashFront=true;renderFlash()} function prevFlash(){flashIndex=(flashIndex-1+allWords().length)%allWords().length;flashFront=true;renderFlash()}
function speak(text){if(!('speechSynthesis' in window)){alert('このブラウザは音声読み上げに未対応です。');return}const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=.9;speechSynthesis.cancel();speechSynthesis.speak(u)}
function currentFlashWord(){return allWords()[flashIndex%allWords().length]} function speakWord(){speak(currentFlashWord().word)} function speakExample(){speak(currentFlashWord().example)}
function randomChoice(arr){return arr[Math.floor(Math.random()*arr.length)]} function shuffle(arr){return [...arr].sort(()=>Math.random()-0.5)} function pickWords(n,excludeWord){return allWords().filter(w=>w.word!==excludeWord).sort(()=>Math.random()-0.5).slice(0,n)}
function wordForms(word){const base=word.split(' ')[0];const forms=new Set([base,base.toLowerCase(),base+'s',base+'es',base+'ed',base+'ing']);if(base.endsWith('y')){forms.add(base.slice(0,-1)+'ies');forms.add(base.slice(0,-1)+'ied')}if(base.endsWith('e')){forms.add(base.slice(0,-1)+'ing');forms.add(base+'d')}return [...forms]}
function makeBlankSentence(example,word){let out=example;for(const f of wordForms(word)){const rx=new RegExp('\\b'+f.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','i');if(rx.test(out))return out.replace(rx,'(      )')}return example+' 〔正しい語を選ぶ〕'}
function setQuizType(type){quizType=type;renderQuiz()}
function makeQuiz(){if(quizType==='rootMeaning'){const r=randomChoice(roots);const opts=shuffle([r.core,...roots.filter(x=>x.root!==r.root).sort(()=>Math.random()-0.5).slice(0,3).map(x=>x.core)]);quiz={q:`語源 ${r.root} のコアイメージとして最も近いものは？`,ans:r.core,hint:r.grasp,opts,tag:r.root};return}if(quizType==='wordMeaning'){const w=randomChoice(allWords());const opts=shuffle([w.meaning,...pickWords(3,w.word).map(x=>x.meaning)]);quiz={q:`${w.word} の意味は？`,ans:w.meaning,hint:w.memo,opts,tag:w.word};return}if(quizType==='sentence'){const w=randomChoice(allWords().filter(x=>x.example&&x.example.length>8));const sentence=makeBlankSentence(w.example,w.word);const opts=shuffle([w.word,...pickWords(3,w.word).map(x=>x.word)]);quiz={q:sentence,ans:w.word,hint:w.memo,opts,tag:w.word}}}
function renderQuiz(){makeQuiz();document.getElementById('app').innerHTML=`<h2>復習テスト</h2><div class="subnav"><button onclick="setQuizType('rootMeaning')" class="${quizType==='rootMeaning'?'active':''}">語源の意味4択</button><button onclick="setQuizType('wordMeaning')" class="${quizType==='wordMeaning'?'active':''}">単語の意味4択</button><button onclick="setQuizType('sentence')" class="${quizType==='sentence'?'active':''}">英文空所4択</button></div><div class="quizbox"><p><span class="badge">復習範囲</span> No.71〜90</p><p>${esc(quiz.q)}</p><div class="options">${quiz.opts.map(o=>`<button class="option" onclick="answerQuiz(this,'${String(o).replace(/'/g,"\\'")}')">${esc(o)}</button>`).join('')}</div><p class="small">今日の目標：10問 / あと ${Math.max(0,10-state.today)} 問</p></div>`;coach('語根の対比がこの分冊のキモ。mono と poly、hyper と hypo、endo と exo を意識しよう。')}
function answerQuiz(btn,choice){state.total++;state.today++;if(choice===quiz.ans){state.correct++;state.points+=10;btn.classList.add('correct');coach('正解！対比まで思い出せたら完璧。+10ポイント！');document.getElementById('app').classList.add('confetti')}else{btn.classList.add('wrong');state.points+=2;coach(`惜しい！ヒント：${quiz.hint}`)}state.review[quiz.tag]=Math.max(0,(state.review[quiz.tag]||0)+(choice===quiz.ans?-1:2));save();setTimeout(()=>{document.getElementById('app').classList.remove('confetti');renderQuiz()},1200)}
function renderReview(){const words=allWords().sort((a,b)=>(state.review[b.word]||0)-(state.review[a.word]||0));const w=words[0];document.getElementById('app').innerHTML=`<h2>復習管理</h2><p class="small">忘れた単語ほど上に出やすくしています。localStorage に簡易保存しています。</p><div class="word"><h3>${esc(w.word)} <span class="badge">${esc(w.level)}</span></h3><p>意味：${esc(w.meaning)}</p><p>例文：${esc(w.example)}</p><p>和訳：${esc(w.ja)}</p><p>語源で理解：${esc(w.memo)}</p></div><div class="subnav"><button onclick="rate('${String(w.word).replace(/'/g,"\\'")}',-1)">覚えた</button><button onclick="rate('${String(w.word).replace(/'/g,"\\'")}',1)">あいまい</button><button onclick="rate('${String(w.word).replace(/'/g,"\\'")}',3)">忘れた</button></div>`;coach('苦手語は対になる接頭辞までセットで覚え直そう。')}
function rate(word,delta){state.review[word]=Math.max(0,(state.review[word]||0)+delta);state.points+=delta<0?6:2;save();renderReview()}
function renderProgress(){const weak=Object.entries(state.review).sort((a,b)=>b[1]-a[1]).slice(0,8);const rate=state.total?Math.round(state.correct/state.total*100):0;const wordCount=allWords().length;let title=state.points>1200?'抽象接頭辞マスター':state.points>700?'対比語根ハンター':state.points>300?'接頭辞チャレンジャー':'たまごシャーク';const rootPct=Math.round((state.learnedRoots.length/roots.length)*100);const wordPct=Math.round((state.learnedWords.length/wordCount)*100);document.getElementById('app').innerHTML=`<h2>進捗確認</h2><div class="stats"><div class="stat"><b>${state.learnedRoots.length}</b><br>学習済み語源</div><div class="stat"><b>${state.learnedWords.length}</b><br>確認済み単語</div><div class="stat"><b>${rate}%</b><br>正答率</div><div class="stat"><b>${state.streak}</b><br>連続学習日数</div><div class="stat"><b>${state.points}</b><br>学習ポイント</div></div><h3>語源進捗</h3><div class="progressbar"><span style="width:${rootPct}%"></span></div><p class="small">${state.learnedRoots.length} / ${roots.length} 語源</p><h3>単語進捗</h3><div class="progressbar"><span style="width:${wordPct}%"></span></div><p class="small">${state.learnedWords.length} / ${wordCount} 語</p><h3>サメの称号：${title}</h3><h3>達成バッジ</h3><p>${state.points>=100?'🏅 100pt達成 ':''}${state.today>=10?'🎯 今日の目標達成 ':''}${state.streak>=3?'🔥 3日連続 ':''}${state.learnedRoots.length>=10?'📚 10語源達成 ':''}${state.learnedRoots.length>=20?'🧭 第4分冊コンプリート ':''}</p><h3>苦手項目</h3><p>${weak.length?weak.map(x=>`${x[0]}（${x[1]}）`).join(' / '):'まだありません'}</p><div class="note" style="margin-top:12px">この完成版は No.71〜90 を搭載しています。抽象接頭辞を対比で整理しながら、評論・理科・社会系の語彙へ広げられます。</div>`;coach('第4分冊は接頭辞の体系化が勝負。対になる語根を往復しよう！')}
render();
</script>
</body>
</html>
